name: rust
on:  # yamllint disable-line rule:truthy
  workflow_call:
    inputs:
      enable_cargo-semver-checks:
        description: |
          Enables cargo-semver-checks - default is true.
        required: false
        type: boolean
        default: true
      coveralls:
        description: |
          Makes cargo-test upload test coverage data to coveralls.io
          when true.
        required: false
        type: boolean
        default: false
      codecov:
        description: |
          Makes *cargo-test* upload test coverage data to codecov.io
          when true.
        required: false
        type: boolean
        default: false
      deb:
        description: Enables deb when true.
        required: false
        type: boolean
        default: false
      rpm:
        description: Enables rpm when true.
        required: false
        type: boolean
        default: false
      dependencies_debian:
        description: |
          Dependencies as Debian packages to install; used in the
          appropriate actions if defined
        type: string
      release_files:
        description: Files to publish in the github release .tar.gz
        required: false
        type: string
        default: ''
      publish_cratesio:
        description: Enables the publish-cratesio job.
        required: false
        type: boolean
        default: true
      publish_github_release:
        description: Enables the publish-github-release job.
        required: false
        type: boolean
        default: true
      publish_packagecloud_repository_deb:
        description: packagecloud repository to publish the .deb.
        required: false
        type: string
        default: ''
      publish_packagecloud_repository_rpm:
        description: packagecloud repository to publish the .rpm.
        required: false
        type: string
        default: ''
    secrets:
      CARGO_REGISTRY_TOKEN:
        required: false
      PACKAGECLOUD_TOKEN:
        required: false
jobs:
  info:
    runs-on: ubuntu-latest
    outputs:
      version_tagged: ${{ steps.version.outputs.version_tagged }}
      version_commit: ${{ steps.version.outputs.version_commit }}
      basename: ${{ steps.version.outputs.basename }}
      deb_basename: ${{ steps.version.outputs.deb_basename }}
      rpm_basename: ${{ steps.version.outputs.rpm_basename }}
      arch: ${{ steps.arch.outputs.arch }}
    steps:
      - uses: actions/checkout@v5.0.0
      - id: version
        uses: docker://lpenz/ghaction-version-gen:0.19.0
      - id: arch
        run: |
          echo 'arch=[{"runs": "ubuntu-latest", "rust": "x86_64-unknown-linux-musl", "deb": "amd64", "rpm": "x86_64" }, {"runs": "ubuntu-24.04-arm", "rust": "aarch64-unknown-linux-musl", "deb": "arm64", "rpm": "aarch64"}]' >> $GITHUB_OUTPUT
      - name: show output
        run: >-
          cat $GITHUB_OUTPUT
  cargo-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5.0.0
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo check
  cargo-doc:
    needs: [info]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5.0.0
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo doc --all-features
      # - uses: actions/upload-artifact@v4.6.2
      #   with:
      #     name: ${{ needs.info.outputs.basename }}_doc.zip
      #     if-no-files-found: error
      #     path: target/doc
  cargo-test:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: >
          sudo apt-get install -y --no-install-recommends
          ${{ inputs.dependencies_debian }}
        if: inputs.dependencies_debian
      - uses: actions/checkout@v5.0.0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools
      - uses: taiki-e/install-action@v2.59.1
        with:
          tool: cargo-llvm-cov
      - run: cargo llvm-cov --all-features --lcov --output-path lcov.info
        env:
          CARGO_HUSKY_DONT_INSTALL_HOOKS: true
      - name: Upload coverage data to coveralls
        uses: coverallsapp/github-action@v2.3.6
        if: inputs.coveralls
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path-to-lcov: lcov.info
      - name: Upload coverage data to codecov
        uses: codecov/codecov-action@v5.5.1
        if: inputs.codecov
        with:
          files: lcov.info
          fail_ci_if_error: true
  rustfmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5.0.0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check
  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5.0.0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --all-features
  cargo-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5.0.0
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit
      - run: cargo audit
  rust-misc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5.0.0
      - uses: dtolnay/rust-toolchain@stable
      - name: Check Cargo.lock version against Cargo.toml
        run: cargo update -w --locked
        if: ${{ hashFiles('Cargo.lock') != '' }}
  cargo-semver-checks:
    needs: [info]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5.0.0
      - name: cargo-semver-checks
        uses: obi1kenobi/cargo-semver-checks-action@v2.8
        if: >
          inputs.enable_cargo-semver-checks &&
          needs.info.outputs.version_tagged != ''
  release:
    needs: [info]
    strategy:
      matrix:
        arch: ${{ fromJSON(needs.info.outputs.arch) }}
    runs-on: ${{ matrix.arch.runs }}
    container:
      image: rust:latest
      options: --platform=linux/${{ matrix.arch.deb }}
    steps:
      - name: Install dependencies
        run: >
          set -e -x;
          apt-get update;
          apt-get install -y --no-install-recommends
          ${{ inputs.dependencies_debian }}
          musl-dev
      - uses: actions/checkout@v5.0.0
      - uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.arch.rust }}
      - name: Build release with musl to avoid dependencies
        run: cargo build --release --target ${{ matrix.arch.rust }}
      - name: Create .tar.gz
        run: >
          tar -czf
          ${{ needs.info.outputs.basename }}_${{ matrix.arch.deb }}.tar.gz
          -C target/${{ matrix.arch.rust}}/release/
          ${{ inputs.release_files }}
        if: inputs.release_files
      - uses: actions/upload-artifact@v4.6.2
        if: inputs.release_files
        with:
          name: ${{ needs.info.outputs.basename }}_${{ matrix.arch.deb }}.tar.gz
          path: ${{ needs.info.outputs.basename }}_${{ matrix.arch.deb }}.tar.gz
          if-no-files-found: error
  deb:
    needs: [info]
    strategy:
      matrix:
        arch: ${{ fromJSON(needs.info.outputs.arch) }}
    runs-on: ${{ matrix.arch.runs }}
    container:
      image: rust:latest
      options: --platform=linux/${{ matrix.arch.deb }}
    steps:
      - name: Install dependencies
        run: >
          set -e -x;
          apt-get update;
          apt-get install -y --no-install-recommends
          ${{ inputs.dependencies_debian }}
          musl-dev
        if: inputs.deb
      - uses: actions/checkout@v5.0.0
        if: inputs.deb
      - uses: dtolnay/rust-toolchain@stable
        if: inputs.deb
        with:
          target: ${{ matrix.arch.rust }}
      - name: Install cargo-deb
        if: inputs.deb
        run: cargo install cargo-deb
      - name: Run cargo-deb for tests only
        if: inputs.deb && needs.info.outputs.version_commit == ''
        run: >
          cargo deb --target ${{ matrix.arch.rust }}
      - name: Run cargo-deb for release
        if: inputs.deb && needs.info.outputs.version_commit != ''
        run: >
          cargo deb --target ${{ matrix.arch.rust }}
          --deb-version '${{ needs.info.outputs.version_commit }}'
      - name: Move deb to top dir
        if: inputs.deb
        run: >
          mv -v ./target/${{ matrix.arch.rust }}/debian/*.deb
          ./${{ needs.info.outputs.deb_basename }}_${{ matrix.arch.deb }}.deb
      - name: Show deb information
        if: inputs.deb
        run: >
          set -e -x;
          find . -name '*.deb';
          dpkg -I *.deb;
          dpkg -c *.deb;
      - uses: actions/upload-artifact@v4.6.2
        if: inputs.deb
        with:
          name: >
            ${{ needs.info.outputs.deb_basename }}_${{ matrix.arch.deb }}.deb
          path: >
            ${{ needs.info.outputs.deb_basename }}_${{ matrix.arch.deb }}.deb
          if-no-files-found: error
  rpm:
    needs: [info]
    strategy:
      matrix:
        arch: ${{ fromJSON(needs.info.outputs.arch) }}
    runs-on: ${{ matrix.arch.runs }}
    container:
      image: rust:latest
      options: --platform=linux/${{ matrix.arch.deb }}
    steps:
      - name: Install dependencies
        run: >
          set -e -x;
          apt-get update;
          apt-get install -y --no-install-recommends
          ${{ inputs.dependencies_debian }}
          musl-dev rpm
        if: inputs.rpm
      - uses: actions/checkout@v5.0.0
        if: inputs.rpm
      - uses: dtolnay/rust-toolchain@stable
        if: inputs.rpm
        with:
          target: ${{ matrix.arch.rust }}
      - name: Build release with musl to avoid dependencies
        if: inputs.rpm
        run: cargo build --release --target ${{ matrix.arch.rust }}
      - name: Install cargo-generate-rpm
        if: inputs.rpm
        run: cargo install cargo-generate-rpm
      - name: Generate the RPM
        if: inputs.rpm
        run: >
          cargo generate-rpm --target ${{ matrix.arch.rust }} -o
          ${{ needs.info.outputs.rpm_basename }}.${{ matrix.arch.rpm }}.rpm
      - name: Show rpm info
        if: inputs.rpm
        run: >
          set -e -x;
          find . -name '*.rpm';
          rpm -qp *.rpm --info;
          rpm -qp *.rpm --requires;
          rpm -qp *.rpm --provides;
          rpm -qp *.rpm --list
      - uses: actions/upload-artifact@v4.6.2
        if: inputs.rpm
        with:
          name: ${{ needs.info.outputs.rpm_basename }}.${{ matrix.arch.rpm }}.rpm
          path: ${{ needs.info.outputs.rpm_basename }}.${{ matrix.arch.rpm }}.rpm
          if-no-files-found: error
  ready:  # marks all tests as completed
    needs:
      - info
      - cargo-check
      - cargo-doc
      - cargo-test
      - rustfmt
      - clippy
      - cargo-audit
      - rust-misc
      - cargo-semver-checks
      - release
      - deb
      - rpm
    runs-on: ubuntu-latest
    steps:
      - name: concentrate test dependencies
        run: true
  publish-cratesio:
    needs: [ready, info]
    if: inputs.publish_cratesio
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5.0.0
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Publish crate on crates.io
        uses: katyo/publish-crates@v2
        if: needs.info.outputs.version_tagged != ''
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
  publish-packagecloud-deb:
    needs: [ready, info]
    if: inputs.deb && inputs.publish_packagecloud_repository_deb
    runs-on: ubuntu-latest
    steps:
      - name: Download the package generated by deb
        uses: actions/download-artifact@v5.0.0
        if: inputs.deb
        with:
          merge-multiple: true
          pattern: '*.deb'
      - name: Publish deb on packagecloud
        uses: docker://lpenz/ghaction-packagecloud:0.5
        if: needs.info.outputs.version_tagged != ''
        env:
          PACKAGECLOUD_TOKEN: ${{ secrets.PACKAGECLOUD_TOKEN }}
        with:
          repository: ${{ matrix.repository }}
  publish-packagecloud-rpm:
    needs: [ready, info]
    if: inputs.rpm && inputs.publish_packagecloud_repository_rpm
    runs-on: ubuntu-latest
    steps:
      - name: Download the package generated by rpm
        uses: actions/download-artifact@v5.0.0
        if: inputs.rpm
        with:
          merge-multiple: true
          pattern: '*.rpm'
      - name: Publish rpm on packagecloud
        uses: docker://lpenz/ghaction-packagecloud:0.5
        if: needs.info.outputs.version_tagged != ''
        env:
          PACKAGECLOUD_TOKEN: ${{ secrets.PACKAGECLOUD_TOKEN }}
        with:
          repository: ${{ matrix.repository }}
  publish-github-release:
    needs: [ready, info]
    if: inputs.publish_github_release
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5.0.0
      - name: List all files
        run: ls
      - id: files
        run: >
          printf 'files=' >> $GITHUB_ENV;
          echo -n $(ls) >> $GITHUB_ENV;
          echo >> $GITHUB_ENV
      - run: cat $GITHUB_ENV
      - name: Publish github release
        uses: marvinpinto/action-automatic-releases@v1.2.1
        if: needs.info.outputs.version_tagged != ''
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          prerelease: false
          files: ${{ steps.files.files }}
